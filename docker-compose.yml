version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: perf
      POSTGRES_PASSWORD: perf
      POSTGRES_DB: perf_framework
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perf -d perf_framework"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://perf:perf@postgres:5432/perf_framework
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    ports:
      - "4200:4200"
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000/api/v1
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      API_URL: http://api:4000/api/v1
    depends_on:
      - api
    profiles:
      - worker

volumes:
  pgdata:
